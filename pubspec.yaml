name: bubbles
description: "A clean AI chat mode selection UI demo"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.7
  # '>=3.0.0 <4.0.0' # Adjusted for better compatibility

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  firebase_auth: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1 # Added missing dependency

# Corrected indentation below
flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.jpg"
  remove_alpha_ios: true
