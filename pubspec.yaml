name: bubbles
description: "Craft a dynamic AI chat experience with a captivating four-section homepage, meticulously designed to mirror your vision and powered by the robust state management of Riverpod."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.1
  provider: ^6.1.5+1 
  google_generative_ai: ^0.4.0
  cloud_functions: ^6.0.6
  go_router: ^17.1.0
  flutter_riverpod: ^3.2.1
  intl: ^0.20.2

  http: ^1.0.0
  google_fonts: ^6.1.0
  # go_router: ^16.2.0
  shared_preferences: ^2.0.0
  uuid: ^4.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


# The following section is specific to Flutter packages.
flutter:

  
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/



flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/logo.jpg
  remove_alpha_ios: true